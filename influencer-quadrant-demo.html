<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidda达人四象限分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.8;
            font-size: 16px;
        }
        .chart-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .quadrant-grid {
            position: relative;
            width: 100%;
            aspect-ratio: 1.2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .quadrant {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: 250px;
        }
        .quadrant-name {
            position: absolute;
            top: 12px;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
        }
        .quadrant-desc {
            font-size: 12px;
            color: #999;
            margin-top: 40px;
            margin-bottom: 16px;
        }
        /* 象限背景色 */
        .q1 {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }
        .q1 .quadrant-name { background: #4caf50; }
        
        .q2 {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
        }
        .q2 .quadrant-name { background: #ff9800; }
        
        .q3 {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
        }
        .q3 .quadrant-name { background: #9e9e9e; }
        
        .q4 {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }
        .q4 .quadrant-name { background: #2196f3; }
        
        /* 达人是方块 */
        .influencer {
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 6px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .influencer:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .influencer .name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        .influencer .platform {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        /* 轴标签 */
        .axis-x {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .axis-y {
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .arrow {
            font-size: 18px;
        }
        .chart-wrapper {
            position: relative;
            padding-bottom: 40px;
        }
        
        /* 示例达人 */
        .sample-influencer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px dashed rgba(255,255,255,0.5);
        }
        .sample-influencer .name {
            color: white;
        }
        .sample-influencer .platform {
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Vidda达人四象限分析</h1>
        <p>横向：带货数量 | 纵向：内容质量</p>
    </div>

    <div class="chart-container">
        <div class="chart-wrapper">
            <!-- 纵轴标签 -->
            <div class="axis-y">
                <span>内容质量</span>
                <span class="arrow">↑</span>
            </div>
            
            <!-- 四象限 -->
            <div class="quadrant-grid">
                <!-- Q1: 右上 - 明星达人 -->
                <div class="quadrant q1">
                    <span class="quadrant-name">⭐ 明星达人</span>
                    <div class="quadrant-desc">高质量 × 高带货</div>
                    
                    <div class="influencer sample-influencer">
                        <div class="name">示例达人</div>
                        <div class="platform">抖音</div>
                    </div>
                </div>

                <!-- Q2: 左上 - 潜力达人 -->
                <div class="quadrant q2">
                    <span class="quadrant-name">🌟 潜力达人</span>
                    <div class="quadrant-desc">高质量 × 低带货</div>
                    
                    <div class="influencer sample-influencer">
                        <div class="name">示例达人</div>
                        <div class="platform">B站</div>
                    </div>
                </div>

                <!-- Q3: 左下 - 观察区 -->
                <div class="quadrant q3">
                    <span class="quadrant-name">👁 观察区</span>
                    <div class="quadrant-desc">低质量 × 低带货</div>
                    
                    <div class="influencer sample-influencer">
                        <div class="name">示例达人</div>
                        <div class="platform">小红书</div>
                    </div>
                </div>

                <!-- Q4: 右下 - 带货达人 -->
                <div class="quadrant q4">
                    <span class="quadrant-name">💰 带货达人</span>
                    <div class="quadrant-desc">低质量 × 高带货</div>
                    
                    <div class="influencer sample-influencer">
                        <div class="name">示例达人</div>
                        <div class="platform">知乎</div>
                    </div>
                </div>
            </div>
            
            <!-- 横轴标签 -->
            <div class="axis-x">
                <span class="arrow">→</span>
                <span>带货数量</span>
            </div>
        </div>
    </div>
</body>
</html>
